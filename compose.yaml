services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: perf
      POSTGRES_PASSWORD: perf123
      POSTGRES_DB: performance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perf -d performance"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://perf:perf123@db:5432/performance
      - JWT_SECRET=perf-scoring-prod-secret-2024
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
